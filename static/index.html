<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Actividad 2 - Electiva II</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 60px 80px;
      text-align: center;
      max-width: 700px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .badge {
      background: linear-gradient(90deg, #e94560, #0f3460);
      border-radius: 50px;
      padding: 8px 24px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 32px;
      display: inline-block;
    }
    h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #fff, #a8d8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .materia {
      font-size: 20px;
      color: #a8d8ff;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .proyecto {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 40px;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #e94560, #a8d8ff);
      margin: 32px auto;
      border-radius: 2px;
    }
    .info {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .info-item {
      text-align: center;
    }
    .info-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 15px;
      font-weight: 600;
      color: #a8d8ff;
    }
    .pipeline-badge {
      margin-top: 40px;
      background: rgba(46, 213, 115, 0.15);
      border: 1px solid rgba(46, 213, 115, 0.4);
      border-radius: 50px;
      padding: 10px 28px;
      font-size: 14px;
      color: #2ed573;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px; height: 8px;
      background: #2ed573;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Electiva II</div>
    <h1>Nicolas Leon</h1>
    <div class="materia">Pipeline CI/CD con GitHub Actions</div>
    <div class="proyecto">Actividad 2 — Tercer Corte</div>
    <div class="divider"></div>
    <div class="info">
      <div class="info-item">
        <div class="info-label">Proyecto</div>
        <div class="info-value">prueba-actividad-2</div>
      </div>
      <div class="info-item">
        <div class="info-label">Usuario GitHub</div>
        <div class="info-value">nleonp04</div>
      </div>
      <div class="info-item">
        <div class="info-label">Tecnología</div>
        <div class="info-value">SvelteKit + Vite</div>
      </div>
    </div>
    <div class="pipeline-badge">
      <div class="dot"></div>
      Pipeline CI/CD activo
    </div>
  </div>
</body>
</html>
